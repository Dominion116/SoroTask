version: 2
updates:
  # 1. GitHub Actions (CI/CD workflows)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "automation"
      - "maintenance"

  # 2. Rust Smart Contract (Soroban)
  # Matches your strict security requirements in deny.toml
  - package-ecosystem: "cargo"
    directory: "/contract"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "smart-contract"
      - "security"
    groups:
      contract-deps:
        patterns:
          - "*"

  # 3. Node.js Keeper Bot
  - package-ecosystem: "npm"
    directory: "/keeper"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "keeper"
      - "backend"
    groups:
      keeper-deps:
        patterns:
          - "*"

  # 4. Next.js Frontend Dashboard
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "frontend"
      - "ui"
    groups:
      frontend-deps:
        patterns:
          - "*"

  # 5. Root Project (Monorepo Tooling: Husky/Lint-staged)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "maintenance"
      - "dx" # Developer Experience
